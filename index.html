<!DOCTYPE html>

<html lang="ja">
  
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>太陽系 3D ビューワー</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="app"></div>

  <div id="header">
    <h1>🪐 太陽系 3D ビューワー</h1>
    <span class="hint">ドラッグで回転 / ホイールでズーム / 惑星をクリックで詳細</span>
  </div>

  <div id="controls">
    <button id="btn-pause">⏸ 一時停止</button>
    <button id="btn-orbits" class="active">軌道線</button>
    <button id="btn-labels" class="active">名前</button>
    <button id="btn-moons" class="active">衛星</button>
    <button id="btn-clouds" class="active">雲・大気</button>
  </div>

  <div id="tooltip"></div>

  <div id="credit">
    テクスチャ：
    <a href="https://www.solarsystemscope.com/textures/" target="_blank" rel="noopener">Solar System Scope</a>
    （<a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC BY 4.0</a>）
    ／冥王星・カロン・ガリレオ衛星：<a href="https://www.nasa.gov/" target="_blank" rel="noopener">NASA</a>（Public Domain）
  </div>
  
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "animejs": "/node_modules/animejs/dist/modules/index.js",
      "animejs/animation": "/node_modules/animejs/dist/modules/animation/index.js",
      "animejs/timer": "/node_modules/animejs/dist/modules/timer/index.js",
      "animejs/timeline": "/node_modules/animejs/dist/modules/timeline/index.js",
      "animejs/animatable": "/node_modules/animejs/dist/modules/animatable/index.js",
      "animejs/draggable": "/node_modules/animejs/dist/modules/draggable/index.js",
      "animejs/layout": "/node_modules/animejs/dist/modules/layout/index.js",
      "animejs/scope": "/node_modules/animejs/dist/modules/scope/index.js",
      "animejs/engine": "/node_modules/animejs/dist/modules/engine/index.js",
      "animejs/events": "/node_modules/animejs/dist/modules/events/index.js",
      "animejs/easings": "/node_modules/animejs/dist/modules/easings/index.js",
      "animejs/utils": "/node_modules/animejs/dist/modules/utils/index.js",
      "animejs/svg": "/node_modules/animejs/dist/modules/svg/index.js",
      "animejs/text": "/node_modules/animejs/dist/modules/text/index.js",
      "animejs/waapi": "/node_modules/animejs/dist/modules/waapi/index.js"
    }
  }
  </script>
  <script type="module" src="./popup.js"></script>

  <div id="popup" aria-live="polite">
    <button class="close" aria-label="閉じる">✕</button>
    <div class="preview">
      <span class="badge"></span>
      <canvas class="planet-img" width="300" height="300"></canvas>
      <!-- <img class="char-img" alt="" /> -->
    </div>
    <div class="body">
      <h2></h2>
      <div class="subtitle"></div>
      <p></p>
      <div class="facts"></div>
      <div class="char-desc">
        <p class="cd-text"></p>
      </div>
    </div>
  </div>

  <div id="loading">太陽系を生成中…</div>
  
  <div id="decor" class=" fixed" style="width: 100%; height: 98dvh; color: white; pointer-events: none;" >
    <img id="tachie" class="fixed">
    <div id="name-romaji" class="fixed pretendard semibold bottom-left" style="left: 6vw; font-size: 10vw; color: blue;"></div>
    <div id="name-kanji" class="fixed pretendard black bottom-left" style="left: 2vw; bottom: 4vw; font-size: 10vw;"></div>
    <div class="fixed bottom-right" style="display: flex; flex-direction: column; text-align: right; width: 50vw">
        <div id="title" class="pretendard regular" style="font-size:4vw"></div>
        <div id="description" class="pretendard light" style="font-size: 1.5vw"></div>
    </div>
    <div class="fixed top-right pretendard" style="display: flex; flex-direction: column; text-align: right; align-items: end;">
        <div id="radius" style="display: flex; flex-direction: row; align-items: baseline;">
            <div class="semibold" style="font-size: 1.5vw;">直径</div>
            <div id="radius-text" class="black" style="font-size: 6vw;"></div>
            <div class="semibold" style="font-size: 3vw;">km</div>
        </div>
        <div id="revolution" style="display: flex; flex-direction: row; align-items: baseline; margin-top: -5vh">
            <div class="semibold" style="font-size: 1.5vw;">公転周期</div>
            <div id="revolution-text" class="black" style="font-size: 6vw;"></div>
            <div class="semibold" style="font-size: 3vw;">日</div>
        </div>
        <div id="rotation" style="display: flex; flex-direction: row; align-items: baseline; margin-top: -5vh">
            <div class="semibold" style="font-size: 1.5vw;">自転周期</div>
            <div id="rotation-text" class="black" style="font-size: 6vw;"></div>
            <div class="semibold" style="font-size: 3vw;">時間</div>
        </div>
        <div id="moon" style="display: flex; flex-direction: row; align-items: baseline; margin-top: -5vh">
            <div class="semibold" style="font-size: 1.5vw;">衛星</div>
            <div id="moon-text" class="black" style="font-size: 6vw;"></div>
            <div class="semibold" style="font-size: 3vw;">個</div>
        </div>
    </div>
  </div>
<!--     
  <div class="fixed" style="width: 100%; height: 98dvh; background-color: transparent; align-items: center; display: grid;">
      <div id="wakusei" style="margin: auto; background-color: green; width: 100px; height: 100px; border-radius: 50%;"></div>
  </div> -->


  <script type="module" src="./three.js"></script>
</body>
</html>
